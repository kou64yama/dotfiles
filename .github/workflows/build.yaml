name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        run: shellcheck install.sh bootstrap.sh

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - env:
          BOOTSTRAP_REVISION: ${{ github.sha }}
        run: |
          bootstrap="$(mktemp)"
          trap 'rm -f "$bootstrap"' EXIT
          curl -fsSL --progress-bar "https://github.com/kou64yama/dotfiles/raw/${BOOTSTRAP_REVISION}/bootstrap.sh" -o "$bootstrap"
          bash "$bootstrap" "$BOOTSTRAP_REVISION"

  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run install.sh outside repo cwd
        run: |
          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT
          cd /tmp
          HOME="$tmp_home" "$GITHUB_WORKSPACE/install.sh"

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and export to Docker
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: ghcr.io/kou64yama/dotfiles:latest
      - name: Smoke test mise version
        run: |
          version="$(docker run --rm ghcr.io/kou64yama/dotfiles:latest /home/dotfiles/.local/bin/mise --version)"
          test "$(printf '%s\n' "$version" | awk '{print $1}')" = "2026.6.6"
      - name: Build and push
        if: ${{ github.event_name == 'push' }}
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/kou64yama/dotfiles:latest
